<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Test Page</title>
  <style>
    :root{
      color-scheme: light dark;
      --bg: #0b0f17;
      --card: rgba(255,255,255,.06);
      --text: rgba(255,255,255,.92);
      --line: rgba(255,255,255,.14);
    }
    @media (prefers-color-scheme: light){
      :root{
        --bg:#f6f7fb;
        --card:#fff;
        --text:#111;
        --line: rgba(0,0,0,.12);
      }
    }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Apple SD Gothic Neo, "Noto Sans KR", Arial, sans-serif;
      background: radial-gradient(1000px 600px at 20% 20%, rgba(90,103,242,.22), transparent 60%),
                  radial-gradient(900px 500px at 80% 30%, rgba(255,107,154,.16), transparent 60%),
                  var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card{
      width:min(720px, 100%);
      background: var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:24px;
      box-shadow: 0 12px 40px rgba(0,0,0,.12);
      backdrop-filter: blur(10px);
      text-align:center;
    }
    h1{ margin:0 0 10px; font-size:28px; }
    p{ margin:0; font-size:16px; }
  </style>
</head>
<body>
  <main class="card" aria-label="Redirect test page">
    <h1>Test Page</h1>
    <p>This is a test page for redirect check</p>
  </main>
</body>
</html>
